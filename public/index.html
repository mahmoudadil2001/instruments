
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Real-time Group Chat</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Username Modal -->
    <div id="usernameModal" class="modal">
        <div class="modal-content">
            <h2>Welcome to Group Chat</h2>
            <input type="text" id="usernameInput" placeholder="Enter your username" maxlength="20">
            <button id="joinBtn">Join Chat</button>
        </div>
    </div>

    <!-- Main Chat Interface -->
    <div id="chatContainer" class="hidden">
        <div class="chat-header">
            <h1>Group Chat</h1>
            <div class="user-info">
                <span id="currentUser"></span>
                <span id="onlineCount"></span>
            </div>
        </div>

        <div class="chat-body">
            <!-- Online Users Sidebar -->
            <div class="sidebar">
                <h3>Online Users</h3>
                <ul id="usersList"></ul>
            </div>

            <!-- Chat Messages Area -->
            <div class="chat-main">
                <div id="messagesContainer"></div>
                
                <!-- Message Input Area -->
                <div class="message-input-area">
                    <div class="input-controls">
                        <input type="file" id="fileInput" accept="image/*,audio/*" style="display: none;">
                        <button id="fileBtn" class="control-btn">📎</button>
                        <button id="voiceBtn" class="control-btn">🎤</button>
                        <input type="text" id="messageInput" placeholder="Type a message..." maxlength="500">
                        <button id="sendBtn">Send</button>
                    </div>
                    <div id="recordingIndicator" class="hidden">
                        <span>🔴 Recording... Click to stop</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="script.js"></script>
</body>
</html>
