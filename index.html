<script>
    // المسار النسبي للمجلد
    const BASE_PATH = 'patho/'; 
    let activeItem = null;

    // القائمة المحدثة بالأسماء الجديدة (بدون أرقام)
    const fileTree = {
        "Chadeer": [
            "biopsy.pdf", "dental caries.pdf", "pulpitis.pdf", "periapical 2.pdf", 
            "Bone infection (N).pdf", "Giant cell lesion (N).pdf", 
            "metabolic and genetic bone diseases (N).pdf", "benign bone.pdf", 
            "Bone tumor.pdf", "odontogenic cyst (N).pdf", "odontogenic tumor.pdf", 
            "developmental teeth (N).pdf", "developmentaldefects of soft and bone.pdf", 
            "oral ulcerative lesions.pdf"
        ],
        "Dr noor": [
            "Biopsy.pdf", "Caries.pdf", "periapical disorder.pdf", "Bone infection NOOR.pdf", 
            "fibrous dysplasia (N).pdf", "Giant cell lesion (N).pdf", 
            "metabolic and genetic bone diseases (N).pdf", "benign bone.pdf", 
            "Bone tumor.pdf", "odontogenic cyst (N).pdf", "odontogenic tumor.pdf", 
            "developmental teeth (N).pdf", "developmental soft and bone.pdf", 
            "terminology.pdf", "primary oral ulcerative lesions.pdf", 
            "ulcerative and vesiculobullous lesions.pdf", "Epithelial Pathology.pdf"
        ],
        "Mohamed": [
            "Fibroosseous lesions.pdf", "odontogenic cyst.pdf", "periodontitis.pdf", 
            "Pulpitis.pdf", "cysts of jaw.pdf", "benign bone tumor.pdf", 
            "oral mucosal lesions.pdf", "immune mediated disorders part 1.pdf", 
            "immune mediated disorders part 2.pdf", "giant cell lesions.pdf", 
            "dental caries.pdf", "Inflammatory diseases of bone.pdf", 
            "malignant bone tumors.pdf", "odontogenic tumors.pdf", "biopsy.pdf"
        ]
    };

    // ترتيب الملفات أبجدياً بما أن الترقيم حُذف
    for (const f in fileTree) {
        fileTree[f].sort((a, b) => a.toLowerCase().localeCompare(b.toLowerCase()));
    }

    function buildTree() {
        const ul = document.getElementById('treeContainer');
        ul.innerHTML = ''; // تنظيف القائمة قبل البناء

        for (const [folder, files] of Object.entries(fileTree)) {
            const li = document.createElement('li');
            
            const folderDiv = document.createElement('div');
            folderDiv.className = 'folder-name';
            folderDiv.innerHTML = `<span>📂</span><span>${folder}</span><span style="font-size:0.75rem;opacity:0.6;">(${files.length})</span><span class="folder-arrow">▶</span>`;

            const fileListDiv = document.createElement('div');
            fileListDiv.className = 'file-list';

            folderDiv.onclick = () => {
                const isOpen = fileListDiv.style.display === 'block';
                fileListDiv.style.display = isOpen ? 'none' : 'block';
                folderDiv.classList.toggle('open', !isOpen);
            };

            files.forEach(file => {
                const row = document.createElement('div');
                row.className = 'file-item';
                const display = file.replace(/\.pdf$/i, ''); // إزالة صيغة الملف عند العرض فقط
                
                // تشفير الرابط للتعامل مع المسافات
                const url = `${BASE_PATH}${folder}/${encodeURIComponent(file)}`;

                row.innerHTML = `<span class="file-name" title="${display}">${display}</span><button class="dl-btn">⬇️</button>`;

                row.onclick = () => {
                    if (activeItem) activeItem.classList.remove('active');
                    row.classList.add('active');
                    activeItem = row;
                    openPDF(url, display);
                };

                row.querySelector('.dl-btn').onclick = (e) => {
                    e.stopPropagation();
                    window.open(url, '_blank');
                };

                fileListDiv.appendChild(row);
            });

            li.appendChild(folderDiv);
            li.appendChild(fileListDiv);
            ul.appendChild(li);
        }
    }

    function openPDF(url, displayName) {
        const frame = document.getElementById('pdfFrame');
        const empty = document.getElementById('emptyState');
        const btnDl = document.getElementById('btnDl');
        const label = document.getElementById('fileLabel');

        empty.style.display = 'none';
        frame.style.display = 'block';
        frame.src = url; 
        
        label.innerHTML = `📄 ${displayName}`;
        btnDl.style.display = 'flex';
        btnDl.onclick = () => { window.open(url, '_blank'); };
    }

    buildTree();
</script>
