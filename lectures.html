<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>dentisitlogy | Mahmoud Adel</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,400&display=swap"
    rel="stylesheet" />
  <style>
    :root {
      --bg: #0b0f1a;
      --surface: #131929;
      --surface2: #1a2236;
      --border: rgba(99, 179, 237, 0.1);
      --accent: #3ecfcf;
      --accent2: #6c8fff;
      --text: #e8f0fe;
      --muted: #7a8caa;
      --glow: 0 0 32px rgba(62, 207, 207, 0.13);
      --transDur: 0.3s;
      --primary: hsl(48, 90%, 55%);
      --primaryT: hsla(48, 90%, 55%, 0.5);
      --primaryT: hsla(48, 90%, 55%, 0.5);
    }

    /* Light Theme Palette */
    [data-theme="light"] {
      --bg: #f8fafc;
      --surface: #ffffff;
      --surface2: #e2e8f0;
      --border: rgba(0, 0, 0, 0.1);
      --accent: #0284c7;
      --accent2: #3b82f6;
      --text: #0f172a;
      --muted: #64748b;
      --glow: 0 0 32px rgba(2, 132, 199, 0.15);
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      transition: background-color 0.3s ease, color 0.3s ease;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 50% at 15% 0%, rgba(62, 207, 207, 0.06) 0%, transparent 60%),
        radial-gradient(ellipse 60% 40% at 85% 90%, rgba(108, 143, 255, 0.06) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(11, 15, 26, 0.88);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
    }

    .header-inner {
      max-width: 720px;
      margin: 0 auto;
      padding: 0 18px;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .logo {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 0.6rem;
      /* صغّر الخط */
      max-width: 120px;
      /* يمنع التمدد */
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .logo-mark {
      width: 32px;
      height: 32px;
      border-radius: 9px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.95rem;
      flex-shrink: 0;
    }

    .logo em {
      color: var(--accent);
      font-style: normal;
    }

    .search-wrap {
      position: relative;
      flex-shrink: 0;
    }

    .search-wrap input {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.83rem;
      padding: 7px 12px 7px 34px;
      width: 140px;
      outline: none;
      transition: border-color 0.2s, width 0.3s;
    }

    .search-wrap input:focus {
      border-color: var(--accent);
      width: 175px;
    }

    .search-icon {
      position: absolute;
      left: 11px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      font-size: 0.8rem;
      pointer-events: none;
    }

    .hero {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 46px 20px 30px;
      max-width: 720px;
      margin: 0 auto;
    }

    .badge {
      display: inline-block;
      background: rgba(62, 207, 207, 0.09);
      border: 1px solid rgba(62, 207, 207, 0.22);
      color: var(--accent);
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 1.6px;
      text-transform: uppercase;
      padding: 5px 13px;
      border-radius: 20px;
      margin-bottom: 18px;
    }

    h1 {
      font-family: 'Syne', sans-serif;
      font-size: clamp(1.75rem, 5.5vw, 2.6rem);
      font-weight: 800;
      line-height: 1.15;
      letter-spacing: -1px;
      margin-bottom: 12px;
    }

    h1 .gr {
      background: linear-gradient(135deg, #00f2fe 0%, #4facfe 50%, #00f2fe 100%);
      background-size: 200% auto;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      font-family: 'Arial', sans-serif;
      /* Cleaner font for numbers */
      font-size: clamp(3rem, 10vw, 4.5rem);
      /* Much larger and responsive */
      font-weight: 900;
      letter-spacing: 2px;
      animation: shineGradient 3s linear infinite;
      display: inline-block;
      margin-top: 8px;
      filter: drop-shadow(0px 8px 16px rgba(79, 172, 254, 0.5));
    }

    @keyframes shineGradient {
      to {
        background-position: 200% center;
      }
    }

    .hero-sub {
      color: var(--muted);
      font-size: 0.9rem;
      max-width: 320px;
      margin: 0 auto 28px;
      line-height: 1.6;
    }

    .stats {
      display: flex;
      justify-content: center;
      gap: 28px;
    }

    .stat-num {
      font-family: 'Arial', sans-serif;
      font-size: clamp(2rem, 7vw, 2.5rem);
      font-weight: 900;
      background: linear-gradient(135deg, #4dd9f7, #6c8fff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      display: block;
      line-height: 1.1;
      letter-spacing: 1px;
      filter: drop-shadow(0 4px 10px rgba(77, 217, 247, 0.35));
    }

    .stat-label {
      font-size: clamp(0.75rem, 2.5vw, 0.9rem);
      color: var(--muted);
      margin-top: 6px;
      text-transform: uppercase;
      letter-spacing: 1px;
      font-weight: 600;
    }

    .tabs-outer {
      max-width: 720px;
      margin: 0 auto;
      padding: 0 18px 14px;
      overflow-x: auto;
      scrollbar-width: none;
    }

    .tabs-outer::-webkit-scrollbar {
      display: none;
    }

    .tabs {
      display: flex;
      gap: 7px;
      width: max-content;
    }

    .tab {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--muted);
      font-size: 0.78rem;
      padding: 6px 14px;
      border-radius: 18px;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.2s;
    }

    .tab.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #0b0f1a;
      font-weight: 600;
    }

    main {
      max-width: 720px;
      margin: 0 auto;
      padding: 0 18px 80px;
    }

    .subject-card {
      margin-bottom: 10px;
    }

    .subject-header {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      display: flex;
      align-items: center;
      gap: 13px;
      padding: 15px 18px;
      cursor: pointer;
      transition: all 0.22s;
      color: inherit;
    }

    .subject-header:hover {
      background: var(--surface2);
      box-shadow: var(--glow);
    }

    .subject-card.active .subject-header {
      border-bottom-left-radius: 0;
      border-bottom-right-radius: 0;
      background: var(--surface2);
    }

    .s-icon {
      width: 40px;
      height: 40px;
      border-radius: 11px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.15rem;
      flex-shrink: 0;
    }

    .s-info {
      flex: 1;
      min-width: 0;
      text-align: left;
    }

    .s-title {
      font-family: 'Syne', sans-serif;
      font-size: 0.97rem;
      font-weight: 700;
    }

    .s-count {
      font-size: 0.72rem;
      color: var(--muted);
    }

    .chevron {
      color: var(--muted);
      font-size: 0.75rem;
      transition: transform 0.3s;
    }

    .subject-card.active .chevron {
      transform: rotate(180deg);
    }

    .lecture-list {
      background: var(--surface);
      border: 1px solid rgba(62, 207, 207, 0.18);
      border-top: none;
      border-bottom-left-radius: 14px;
      border-bottom-right-radius: 14px;
      overflow: hidden;
      max-height: 0;
      transition: max-height 0.4s ease-out;
      list-style: none;
    }

    .subject-card.active .lecture-list {
      max-height: 3000px;
    }

    .lecture-link {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 18px;
      text-decoration: none;
      color: var(--text);
      font-size: 0.875rem;
      border-bottom: 1px solid var(--border);
      transition: background 0.15s;
    }

    .lecture-link:hover {
      background: rgba(62, 207, 207, 0.05);
    }

    .doc-pill {
      width: 30px;
      height: 30px;
      border-radius: 8px;
      background: rgba(62, 207, 207, 0.07);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.8rem;
    }

    .lec-name {
      flex: 1;
    }

    .tg-arrow {
      font-size: 0.75rem;
      color: var(--muted);
    }

    .hidden {
      display: none;
    }

    footer {
      text-align: center;
      padding: 28px;
      color: var(--muted);
      font-size: 0.78rem;
      border-top: 1px solid var(--border);
    }

    footer span {
      color: var(--accent);
    }

    .avatar {
      --border-color: #4255d4;
      --avatar-size: 34px;
      height: var(--avatar-size);
      width: var(--avatar-size);
      border: 2px solid var(--border-color);
      padding: 3px;
      border-radius: 50%;
      position: relative;
      display: block;
      flex-shrink: 0;
      text-decoration: none;
    }

    .avatar::before,
    .avatar::after {
      content: "";
      position: absolute;
      height: 3px;
      width: 3px;
      border-radius: 50%;
      transform: rotate(45deg);
      left: 0;
      right: 0;
      top: 0;
      bottom: 0;
      margin: auto;
    }

    .avatar::before {
      box-shadow: 24px 0 0 #4255d4, 17px 17px 0 #4255d4, 0 24px 0 #4255d4, -17px 17px 0 #4255d4, -24px 0 0 #4255d4, -17px -17px 0 #4255d4, 0 -24px 0 #4255d4, 17px -17px 0 #4255d4;
      animation: animate-2 1.5s ease-in-out infinite;
    }

    .avatar::after {
      box-shadow: 20px 0 0 #4255d4, 18.5px 7.6px 0 #4255d4, 14.1px 14.1px 0 #4255d4, 7.6px 18.5px 0 #4255d4, 0 20px 0 #4255d4, -7.6px 18.5px 0 #4255d4, -14.1px 14.1px 0 #4255d4, -18.5px 7.6px 0 #4255d4, -20px 0 0 #4255d4, -18.5px -7.6px 0 #4255d4, -14.1px -14.1px 0 #4255d4, -7.6px -18.5px 0 #4255d4, 0 -20px 0 #4255d4, 7.6px -18.5px 0 #4255d4, 14.1px -14.1px 0 #4255d4, 18.5px -7.6px 0 #4255d4;
      transform: rotate(12deg);
      animation: animate-1 1.5s ease-in-out infinite;
    }

    .avatar img {
      max-width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: inherit;
      display: block;
    }

    @keyframes animate-1 {

      0%,
      100% {
        transform: rotate(12deg) scale(1);
      }

      50% {
        transform: rotate(12deg) scale(0.9);
      }
    }

    @keyframes animate-2 {

      0%,
      100% {
        transform: scale(0.85);
      }

      50% {
        transform: scale(1);
      }
    }

    /* New Theme Toggle Switch */
    .toggleWrapper {
      display: flex;
      align-items: center;
      transform: scale(0.45);
      /* Scale down the button to fit header */
      transform-origin: left center;
    }

    @media (max-width: 600px) {
      .toggleWrapper {
        transform: scale(0.35);
        /* Smaller on mobile */
      }
    }

    .toggleWrapper .input {
      position: absolute;
      left: -99em;
      opacity: 0;
    }

    .toggle {
      cursor: pointer;
      display: inline-block;
      position: relative;
      width: 90px;
      height: 50px;
      background-color: #83d8ff;
      border-radius: 84px;
      transition: background-color 200ms cubic-bezier(0.445, 0.05, 0.55, 0.95);
    }

    .toggle__handler {
      display: inline-block;
      position: relative;
      z-index: 1;
      top: 3px;
      left: 3px;
      width: 44px;
      height: 44px;
      background-color: #ffcf96;
      border-radius: 50px;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.3);
      transition: all 400ms cubic-bezier(0.68, -0.55, 0.265, 1.55);
      transform: rotate(-45deg);
    }

    .toggle__handler .crater {
      position: absolute;
      background-color: #e8cda5;
      opacity: 0;
      transition: opacity 200ms ease-in-out;
      border-radius: 100%;
    }

    .toggle__handler .crater--1 {
      top: 18px;
      left: 10px;
      width: 4px;
      height: 4px;
    }

    .toggle__handler .crater--2 {
      top: 28px;
      left: 22px;
      width: 6px;
      height: 6px;
    }

    .toggle__handler .crater--3 {
      top: 10px;
      left: 25px;
      width: 8px;
      height: 8px;
    }

    .star {
      position: absolute;
      background-color: #fff;
      transition: all 300ms cubic-bezier(0.445, 0.05, 0.55, 0.95);
      border-radius: 50%;
    }

    .star--1 {
      top: 10px;
      left: 35px;
      z-index: 0;
      width: 30px;
      height: 3px;
    }

    .star--2 {
      top: 18px;
      left: 28px;
      z-index: 1;
      width: 30px;
      height: 3px;
    }

    .star--3 {
      top: 27px;
      left: 40px;
      z-index: 0;
      width: 30px;
      height: 3px;
    }

    .star--4,
    .star--5,
    .star--6 {
      opacity: 0;
      transition: all 300ms 0 cubic-bezier(0.445, 0.05, 0.55, 0.95);
    }

    .star--4 {
      top: 16px;
      left: 11px;
      z-index: 0;
      width: 2px;
      height: 2px;
      transform: translate3d(3px, 0, 0);
    }

    .star--5 {
      top: 32px;
      left: 17px;
      z-index: 0;
      width: 3px;
      height: 3px;
      transform: translate3d(3px, 0, 0);
    }

    .star--6 {
      top: 36px;
      left: 28px;
      z-index: 0;
      width: 2px;
      height: 2px;
      transform: translate3d(3px, 0, 0);
    }

    .input:checked+.toggle {
      background-color: #749dd6;
    }

    .input:checked+.toggle .toggle__handler {
      background-color: #ffe5b5;
      transform: translate3d(40px, 0, 0) rotate(0);
    }

    .input:checked+.toggle .toggle__handler .crater {
      opacity: 1;
    }

    .input:checked+.toggle .star--1 {
      width: 2px;
      height: 2px;
    }

    .input:checked+.toggle .star--2 {
      width: 4px;
      height: 4px;
      transform: translate3d(-5px, 0, 0);
    }

    .input:checked+.toggle .star--3 {
      width: 2px;
      height: 2px;
      transform: translate3d(-7px, 0, 0);
    }

    .input:checked+.toggle .star--4,
    .input:checked+.toggle .star--5,
    .input:checked+.toggle .star--6 {
      opacity: 1;
      transform: translate3d(0, 0, 0);
    }

    .input:checked+.toggle .star--4 {
      transition: all 300ms 200ms cubic-bezier(0.445, 0.05, 0.55, 0.95);
    }

    .input:checked+.toggle .star--5 {
      transition: all 300ms 300ms cubic-bezier(0.445, 0.05, 0.55, 0.95);
    }

    .input:checked+.toggle .star--6 {
      transition: all 300ms 400ms cubic-bezier(0.445, 0.05, 0.55, 0.95);
    }

    /* Exam Road Styles - Premium Font and Colors */
    .exam-road-container {
      margin: 40px auto 20px;
      max-width: 100%;
      background: transparent;
      position: relative;
    }

    .exam-road {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      background: linear-gradient(180deg, #131929 0%, #0b0f1a 100%);
      padding: 45px 12px 25px;
      min-height: 220px;
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.05);
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
      gap: 4px;
    }

    .day-stripe {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
      gap: 10px;
      position: relative;
      min-width: 0;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .day-stripe .subject-name {
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--exam-color, #fff);
      font-family: 'Syne', sans-serif;
      text-align: center;
      letter-spacing: -0.2px;
      line-height: 1.1;
      max-width: 100%;
      text-shadow: 0 2px 4px rgba(0, 0, 0, 0.5);
    }

    .day-stripe .day-name-ar {
      font-size: 0.8rem;
      color: #fff;
      font-weight: 600;
      font-family: 'Arial', sans-serif;
      opacity: 0.9;
    }

    .day-stripe .day-name-small {
      font-size: 0.65rem;
      color: rgba(255, 255, 255, 0.5);
      font-weight: 500;
      font-family: 'Arial', sans-serif;
    }

    .day-stripe .date-val {
      font-size: 0.95rem;
      font-weight: 700;
      color: rgba(255, 255, 255, 0.9);
      font-family: 'Syne', sans-serif;
      line-height: 1;
      letter-spacing: 0;
      margin-bottom: 2px;
    }

    .day-stripe .white-block {
      width: 100%;
      max-width: 45px;
      height: 12px;
      background: var(--exam-color, #fff);
      border-radius: 2px;
      transition: all 0.3s;
      opacity: 0.8;
    }

    .day-stripe.today .white-block {
      background: #c2f5ff;
      box-shadow: 0 0 20px rgba(194, 245, 255, 0.6);
      opacity: 1;
      height: 16px;
    }

    .character-icon {
      width: 35px;
      height: 60px;
      margin-bottom: 2px;
      display: flex;
      align-items: center;
      justify-content: center;
      filter: drop-shadow(0 0 10px rgba(255, 255, 255, 0.2));
    }

    .exam-road-footer {
      padding: 15px 0;
      display: flex;
      justify-content: space-between;
      gap: 10px;
    }

    .next-week-btn {
      background: #131929;
      border: 1px solid rgba(255, 255, 255, 0.08);
      color: #3ecfcf;
      padding: 12px 22px;
      border-radius: 100px;
      font-weight: 700;
      cursor: pointer;
      font-size: 0.85rem;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: all 0.25s;
      box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3);
      font-family: 'Syne', sans-serif;
    }

    .next-week-btn:hover {
      background: #1e2538;
      border-color: var(--accent);
      transform: translateY(-2px);
      box-shadow: 0 15px 25px rgba(0, 0, 0, 0.4);
    }

    .next-week-btn span {
      font-size: 1.1rem;
    }

    @media (max-width: 600px) {
      .exam-road {
        padding: 40px 8px 20px;
        min-height: 200px;
      }

      .day-stripe .date-val {
        font-size: 0.85rem;
      }

      .day-stripe .subject-name {
        font-size: 0.72rem;
      }

      .day-stripe .day-name-ar {
        font-size: 0.7rem;
      }

      .day-stripe .day-name-small {
        font-size: 0.55rem;
      }

      .day-stripe .white-block {
        height: 10px;
        max-width: 35px;
      }

      .character-icon {
        height: 50px;
        width: 30px;
      }
    }

    /* Schedule Accordion Styles */
    .schedule-accordion {
      margin: 20px auto 30px;
      max-width: 100%;
      border: 1px solid var(--border);
      border-radius: 18px;
      overflow: hidden;
      background: rgba(255, 255, 255, 0.02);
      backdrop-filter: blur(10px);
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .schedule-header {
      width: 100%;
      padding: 16px 22px;
      background: rgba(62, 207, 207, 0.05);
      border: none;
      color: var(--text);
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 1rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      cursor: pointer;
      transition: all 0.3s;
    }

    .schedule-header:hover {
      background: rgba(62, 207, 207, 0.12);
    }

    .schedule-header .chevron-icon {
      font-size: 0.75rem;
      transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      color: var(--accent);
    }

    .schedule-accordion.active .chevron-icon {
      transform: rotate(180deg);
    }

    .schedule-content {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.5s cubic-bezier(0, 1, 0, 1);
    }

    .schedule-accordion.active {
      border-color: rgba(62, 207, 207, 0.3);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);

      if (prevBtn) prevBtn.style.visibility = currentWeekOffset > 0 ? 'visible' : 'hidden';

      const startDate = new Date(today);
      startDate.setDate(today.getDate() + (currentWeekOffset * 7));

      for (let i = 0; i < 7; i++) {
        const d = new Date(startDate);
        d.setDate(startDate.getDate() + i);

        const dateStr = d.toISOString().split('T')[0];
        const isToday = d.toDateString() === today.toDateString();
        const dayName = d.toLocaleDateString('en-US', { weekday: 'short' });
        const dayNum = d.getDate();
        const monthNum = d.getMonth() + 1;

        const stripe = document.createElement('div');
        stripe.className = `day-stripe ${isToday ? 'today' : ''}`;

        // Find exam and assign color based on its index in the main schedule
        const examIdx = examSchedule.findIndex(e => e.date === dateStr);
        const exam = examIdx !== -1 ? examSchedule[examIdx] : null;

        if (exam) {
          stripe.style.setProperty('--exam-color', examColors[examIdx % examColors.length]);
        }

        let contentHTML = '';

        if (exam) {
          contentHTML += `<div class="subject-name">${exam.name}</div>`;
          contentHTML += `<div class="day-name-ar">${arabicDays[dayName] || ''}</div>`;
        } else {
          contentHTML += `<div class="subject-name" style="visibility:hidden">.</div>`;
          if (!isToday) {
            contentHTML += `<div class="day-name-small">${arabicDays[dayName] || ''}</div>`;
          } else {
            contentHTML += `<div class="day-name-ar" style="visibility:hidden">.</div>`;
          }
        }

        if (isToday) {
          contentHTML += `
            <div class="character-icon">
              <svg viewBox="0 0 30 50" width="30" height="60">
                <circle cx="15" cy="12" r="9" fill="white"/>
                <path d="M15 22 L15 38 L8 50 M15 38 L22 50 M15 28 L7 32 M15 28 L23 32" stroke="white" stroke-width="4" stroke-linecap="round"/>
              </svg>
            </div>
          `;
        } else {
          contentHTML += `<div class="date-val">${monthNum}/${dayNum}</div>`;
        }

        contentHTML += `<div class="white-block"></div>`;

        stripe.innerHTML = contentHTML;
        roadEl.appendChild(stripe);
      }
    }

    nextBtn.addEventListener('click', () => {
      currentWeekOffset++;
      renderExamRoad();
    });

    prevBtn.addEventListener('click', () => {
      if (currentWeekOffset > 0) {
        currentWeekOffset--;
        renderExamRoad();
      }
    });

    // Schedule Accordion Logic
    const schedAccordion = document.getElementById('scheduleAccordion');
    const schedHeader = document.getElementById('scheduleHeader');
    const schedContent = document.getElementById('scheduleContent');

    schedHeader.addEventListener('click', () => {
      schedAccordion.classList.toggle('active');
      const isActive = schedAccordion.classList.contains('active');
      schedHeader.setAttribute('aria-expanded', isActive);
      schedContent.setAttribute('aria-hidden', !isActive);
    });

    renderExamRoad();
  </script>
</body>

</html>
