    :root {

      --surface: #131929;

      --accent: #3ecfcf;
      --accent2: #6c8fff;
      --text: #e8f0fe;
      --muted: #7a8caa;
      --glow: 0 0 32px rgba(62,207,207,0.13);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 50% at 15% 0%, rgba(62,207,207,0.06) 0%, transparent 60%),
        radial-gradient(ellipse 60% 40% at 85% 90%, rgba(108,143,255,0.06) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(11,15,26,0.88);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
    }

    .header-inner {
      max-width: 720px;
      margin: 0 auto;
      padding: 0 18px;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .logo {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 0.6rem;   /* صغّر الخط */
      max-width: 120px;    /* يمنع التمدد */
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .logo-mark {
      width: 32px;
      height: 32px;
      border-radius: 9px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.95rem;
      flex-shrink: 0;
    }

    .logo em { color: var(--accent); font-style: normal; }

    .search-wrap { position: relative; flex-shrink: 0; }
    .search-wrap input {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.83rem;
      padding: 7px 12px 7px 34px;
      width: 140px;
      outline: none;
      transition: border-color 0.2s, width 0.3s;
    }
    .search-wrap input:focus { border-color: var(--accent); width: 175px; }
    .search-icon {
      position: absolute;
      left: 11px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      font-size: 0.8rem;
      pointer-events: none;
    }

    .hero {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 46px 20px 30px;
      max-width: 720px;
      margin: 0 auto;
    }

    .badge {
      display: inline-block;
      background: rgba(62,207,207,0.09);
      border: 1px solid rgba(62,207,207,0.22);
      color: var(--accent);
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 1.6px;
      text-transform: uppercase;
      padding: 5px 13px;
      border-radius: 20px;
      margin-bottom: 18px;
    }

    h1 {
      font-family: 'Syne', sans-serif;
      font-size: clamp(1.75rem, 5.5vw, 2.6rem);
      font-weight: 800;
      line-height: 1.15;
      letter-spacing: -1px;
      margin-bottom: 12px;
    }

    h1 .gr {
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .hero-sub { color: var(--muted); font-size: 0.9rem; max-width: 320px; margin: 0 auto 28px; line-height: 1.6; }

    .stats {
      display: flex;
      justify-content: center;
      gap: 28px;
    }
    .stat-num {
      font-family: 'Syne', sans-serif;
      font-size: 1.45rem;
      font-weight: 800;
      color: var(--accent);
      display: block;
      line-height: 1;
    }
    .stat-label { font-size: 0.7rem; color: var(--muted); margin-top: 3px; }

    .tabs-outer {
      max-width: 720px;
      margin: 0 auto;
      padding: 0 18px 14px;
      overflow-x: auto;
      scrollbar-width: none;
    }
    .tabs-outer::-webkit-scrollbar { display: none; }
    .tabs { display: flex; gap: 7px; width: max-content; }

    .tab {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--muted);
      font-size: 0.78rem;
      padding: 6px 14px;
      border-radius: 18px;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.2s;
    }
    .tab.active { background: var(--accent); border-color: var(--accent); color: #0b0f1a; font-weight: 600; }

    main {
      max-width: 720px;
      margin: 0 auto;
      padding: 0 18px 80px;
    }

    .subject-card { margin-bottom: 10px; }

    .subject-header {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      display: flex;
      align-items: center;
      gap: 13px;
      padding: 15px 18px;
      cursor: pointer;
      transition: all 0.22s;
      color: inherit;
    }

    .subject-header:hover { background: var(--surface2); box-shadow: var(--glow); }

    .subject-card.active .subject-header {
      border-bottom-left-radius: 0;
      border-bottom-right-radius: 0;
      background: var(--surface2);
    }

    .s-icon {
      width: 40px;
      height: 40px;
      border-radius: 11px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.15rem;
      flex-shrink: 0;
    }

    .s-info { flex: 1; min-width: 0; text-align: left; }
    .s-title { font-family: 'Syne', sans-serif; font-size: 0.97rem; font-weight: 700; }
    .s-count { font-size: 0.72rem; color: var(--muted); }

    .chevron { color: var(--muted); font-size: 0.75rem; transition: transform 0.3s; }
    .subject-card.active .chevron { transform: rotate(180deg); }

    .lecture-list {
      background: var(--surface);
      border: 1px solid rgba(62,207,207,0.18);
      border-top: none;
      border-bottom-left-radius: 14px;
      border-bottom-right-radius: 14px;
      overflow: hidden;
      max-height: 0;
      transition: max-height 0.4s ease-out;
      list-style: none;
    }
    .subject-card.active .lecture-list { max-height: 3000px; }

    .lecture-link {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 18px;
      text-decoration: none;
      color: var(--text);
      font-size: 0.875rem;
      border-bottom: 1px solid var(--border);
      transition: background 0.15s;
    }
    .lecture-link:hover { background: rgba(62,207,207,0.05); }

    .doc-pill {
      width: 30px;
      height: 30px;
      border-radius: 8px;
      background: rgba(62,207,207,0.07);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.8rem;
    }

    .lec-name { flex: 1; }
    .tg-arrow { font-size: 0.75rem; color: var(--muted); }

    .hidden { display: none; }

    footer {
      text-align: center;
      padding: 28px;
      color: var(--muted);
      font-size: 0.78rem;
      border-top: 1px solid var(--border);
    }
    footer span { color: var(--accent); }
    .avatar {
      --border-color: #4255d4;
      --avatar-size: 34px;
      height: var(--avatar-size);
      width: var(--avatar-size);
      border: 2px solid var(--border-color);
      padding: 3px;
      border-radius: 50%;
      position: relative;
      display: block;
      flex-shrink: 0;
      text-decoration: none;
    }
    .avatar::before,
    .avatar::after {
      content: "";
      position: absolute;
      height: 3px;
      width: 3px;
      border-radius: 50%;
      transform: rotate(45deg);
      left: 0;
      right: 0;
      top: 0;
      bottom: 0;
      margin: auto;
    }
    .avatar::before {
      box-shadow: 24px 0 0 #4255d4, 17px 17px 0 #4255d4, 0 24px 0 #4255d4, -17px 17px 0 #4255d4, -24px 0 0 #4255d4, -17px -17px 0 #4255d4, 0 -24px 0 #4255d4, 17px -17px 0 #4255d4;
      animation: animate-2 1.5s ease-in-out infinite;
    }
    .avatar::after {
      box-shadow: 20px 0 0 #4255d4, 18.5px 7.6px 0 #4255d4, 14.1px 14.1px 0 #4255d4, 7.6px 18.5px 0 #4255d4, 0 20px 0 #4255d4, -7.6px 18.5px 0 #4255d4, -14.1px 14.1px 0 #4255d4, -18.5px 7.6px 0 #4255d4, -20px 0 0 #4255d4, -18.5px -7.6px 0 #4255d4, -14.1px -14.1px 0 #4255d4, -7.6px -18.5px 0 #4255d4, 0 -20px 0 #4255d4, 7.6px -18.5px 0 #4255d4, 14.1px -14.1px 0 #4255d4, 18.5px -7.6px 0 #4255d4;
      transform: rotate(12deg);
      animation: animate-1 1.5s ease-in-out infinite;
    }
    .avatar img {
      max-width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: inherit;
      display: block;
    }
    @keyframes animate-1 {
      0%, 100% { transform: rotate(12deg) scale(1); }
      50% { transform: rotate(12deg) scale(0.9); }
    }
    @keyframes animate-2 {
      0%, 100% { transform: scale(0.85); }
      50% { transform: scale(1); }
    }

</head>

      icon: "🦷", color: "#1a1a0d",
      lectures: [
        { n: "(1) Osteology", l: "193" }, { n: "(2) Myology", l: "194" },
        { n: "(3) Diagnosis & Treatment Plan for RPD", l: "195" }, { n: "(4) Mouth Preparation for RPD", l: "196" },
        { n: "(5) Impression for RPD", l: "197" }, { n: "(6) Secondary Impression for RPD", l: "198" },
        { n: "(7) Support for Distal Extension base", l: "199" }, { n: "(8) RPD Framework Try In", l: "200" },
        { n: "(9) Occlusal Relationships for RPD", l: "201" }, { n: "(10) Selection and arrangement of teeth", l: "202" },
        { n: "(11) RPD Insertion and Recall Visits", l: "203" }, { n: "(12) pre prosthetic surgery", l: "204" },
        { n: "(13) Diagnosis and treatment for CD", l: "205" }, { n: "(14) Complete Denture Impressions", l: "206" },
        { n: "(15) Complete Denture Impressions - Part 2", l: "207" }, { n: "(16) Mandibular Movement & Jaw Relation", l: "208" },
        { n: "(17) vertical jaw relation", l: "209" }, { n: "(18) Horizontal Jaw Relations", l: "210" },
        { n: "(19) RCD Selection of Artificial Teeth and Try-in", l: "211" }, { n: "(20) Insertion of Complete Dentures", l: "212" },
        { n: "(21) Post Insertion Problems in Complete Denture", l: "213" }, { n: "(22) Relining and Rebasing", l: "214" },
        { n: "(23) Esthetic Denture Materials", l: "215" }, { n: "(24) Digital Denture", l: "216" }
      ]
    }
  };

  const main = document.getElementById('mainContent');
  const tgBase = "https://t.me/alissrasubjects/";

  // Render Logic
  Object.keys(curriculumData).forEach(subject => {
    const data = curriculumData[subject];
    const card = document.createElement('div');
    card.className = 'subject-card';
    card.dataset.subject = subject;
    
    let lecturesHTML = data.lectures.map(lec => `
      <li>
        <a href="${tgBase}${lec.l}" target="_blank" class="lecture-link">
          <div class="doc-pill">📄</div>
          <span class="lec-name">${lec.n}</span>
          <span class="tg-arrow">→</span>
        </a>
      </li>
    `).join('');

    card.innerHTML = `
      <button class="subject-header">
        <div class="s-icon" style="background: ${data.color}">${data.icon}</div>
        <div class="s-info">
          <div class="s-title">${subject}</div>
          <div class="s-count">${data.lectures.length} Lectures</div>
        </div>
        <span class="chevron">▼</span>
      </button>
      <ul class="lecture-list">${lecturesHTML}</ul>
    `;
    main.appendChild(card);
  });

  // Accordion Logic
  document.querySelectorAll('.subject-header').forEach(btn => {
    btn.addEventListener('click', () => {
      const card = btn.closest('.subject-card');
      const isOpen = card.classList.contains('active');
      document.querySelectorAll('.subject-card').forEach(c => c.classList.remove('active'));
      if (!isOpen) card.classList.add('active');
    });
  });

  // Tab Filtering
  document.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      const filter = tab.dataset.filter;
      document.querySelectorAll('.subject-card').forEach(card => {
        card.classList.toggle('hidden', filter !== 'all' && card.dataset.subject !== filter);
      });
    });
  });

  // Search Logic
  document.getElementById('searchInput').addEventListener('input', function() {
    const q = this.value.toLowerCase();
    document.querySelectorAll('.subject-card').forEach(card => {
      let match = false;
      card.querySelectorAll('.lecture-link').forEach(link => {
        const text = link.textContent.toLowerCase();
        const isMatch = text.includes(q);
        link.parentElement.style.display = isMatch ? 'block' : 'none';
        if (isMatch) match = true;
      });
      card.classList.toggle('hidden', !match && q !== '');
      if (q) card.classList.add('active');
    });
  });
</script>

</body>
